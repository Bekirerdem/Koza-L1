name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Show Forge version
        run: forge --version

      - name: Forge build (with --sizes)
        run: forge build --sizes

      - name: Forge fmt check
        run: forge fmt --check

      - name: Forge tests (fuzz 10000 runs)
        run: forge test --fuzz-runs 10000 -vvv

      - name: Forge coverage
        run: forge coverage --report lcov --report summary
        continue-on-error: true

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        if: always()
        with:
          files: ./lcov.info
          fail_ci_if_error: false

  slither:
    name: Slither Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Run Slither
        uses: crytic/slither-action@v0.4.0
        id: slither
        with:
          fail-on: medium
          slither-args: --filter-paths "lib/|test/" --exclude-informational

  aderyn:
    name: Aderyn Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install Aderyn
        run: cargo install aderyn --locked

      - name: Run Aderyn
        run: aderyn . --no-snapshot
        continue-on-error: true
