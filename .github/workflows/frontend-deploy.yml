name: Frontend Deploy (Cloudflare Pages)

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Build & Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Astro type check
        run: npx astro check

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: frontend
          # NOT: Cloudflare Pages projesinin gerçek adı kullanıcı dashboard'unda
          # `koza-l1` olarak duruyor. Repo adı + branding rebrand'da değişti
          # (Kozalak-L1) ama Pages projesi henüz manuel rename edilmedi.
          # Dashboard'da proje adı `kozalak-l1`'e değiştirilirse buradaki
          # --project-name'i de güncelle.
          command: pages deploy dist --project-name=koza-l1 --branch=main
