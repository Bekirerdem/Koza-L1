[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
# solc pragma-driven (auto-detect). icm-contracts (ictt/Teleporter) sıkı `pragma 0.8.25`
# pin'iyor; biz Sprint 1+2 template'lerinde 0.8.34 kullanıyoruz. Multi-version compile.
auto_detect_solc = true
optimizer = true
optimizer_runs = 200
via_ir = true
bytecode_hash = "none"
cbor_metadata = false
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
    "icm-contracts/=lib/icm-contracts/",
    "@subnet-evm/=lib/icm-contracts/contracts/subnet-evm/",
    "@teleporter/=lib/icm-contracts/contracts/teleporter/",
    "@utilities/=lib/icm-contracts/contracts/utilities/",
    "@mocks/=lib/icm-contracts/contracts/mocks/",
    "@ictt/=lib/icm-contracts/contracts/ictt/"
]

[profile.default.fuzz]
runs = 10000
max_test_rejects = 1000000

[profile.default.invariant]
runs = 1000
depth = 100
fail_on_revert = false

[profile.ci]
fuzz = { runs = 50000 }
invariant = { runs = 5000, depth = 200 }
verbosity = 4

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"
multiline_func_header = "all"
quote_style = "double"
number_underscore = "thousands"

[rpc_endpoints]
fuji = "https://api.avax-test.network/ext/bc/C/rpc"
avalanche = "https://api.avax.network/ext/bc/C/rpc"

[etherscan]
fuji = { key = "${SNOWTRACE_API_KEY}", url = "https://api.routescan.io/v2/network/testnet/evm/43113/etherscan", chain = 43113 }
avalanche = { key = "${SNOWTRACE_API_KEY}", url = "https://api.routescan.io/v2/network/mainnet/evm/43114/etherscan", chain = 43114 }
